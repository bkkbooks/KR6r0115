body:
  text: 略敘傳大毗盧遮那成佛神變加持經大教相承付法次第記經題名大毗盧遮那成佛神變加持經梵云摩訶此翻云大毗盧遮那此云光明遍照或云大日遍照正梵語應云吠無每反盧左曩毗盧遮那者古譯也依金剛頂義決中解此毗盧遮那義翻為無邊廣眼聚如來眼者智也言此法身如來智惠十眼無邊際故神德智惠萬德已圓如虛空界量無邊際過數量故也或云毗盧遮那成道經梵云吠盧左曩三母弟婆灑多素怛囕二合此云大日遍照尊經此經梵夾有三本廣本十萬偈若依梵本具譯可有三百餘卷已來廣本在西國不到此土梵經略本四千偈經更有略本二千五百偈中天竺國大阿闍梨集今時所傳者四千偈釋迦沙門三藏善無畏開元七年奉詔譯沙門一行筆授即大毗盧遮那成佛神變加持經是也言此經是毗盧遮那如來神通變化之所加持也依梵本譯成六卷又總集一部教持念次第共成一卷成七卷共成一部編入大藏經時毗盧遮那如來在金剛法界宮與普賢等諸大菩薩十佛剎微塵數金剛牛祕密主等十佛剎微塵數諸執金剛護世主天等其數無量不可稱説皆是毗盧遮那如來自受用身海廣大法界之所加持也經明修真言行菩薩修無上菩提心超越一百六十種忘念心住大菩提心一念相應度三僧祇劫初發心時即得阿耨多羅三藐三菩提心此經依二種修行菩提心為因大悲為根方便為究竟次明十緣生句謂明修真言行菩薩了諸法如幻從緣所生故又依勝義世俗二諦若依勝義修行建立法身曼荼羅是故此經中説先枰虛空中曼荼羅是故本尊法身遠離形色猶如虛空住如是三摩地若依世俗修行依四輪以為曼拏羅本尊聖者若黃色住地輪曼荼羅其形方名金輪聖者若白色住水輪曼荼羅其形圓名水輪聖者若赤色住火輪曼荼羅其形三角聖者若青色若黑色住風輪曼荼羅其形如半月大曼荼羅安於八葉蓮華臺五佛四菩薩安於臺葉中曼荼羅外又三種曼荼羅一一切如來曼荼羅二釋迦牟尼曼荼羅三文殊師利曼荼羅總名為大悲胎藏曼荼羅弟子受灌頂法少曼荼羅極微細委曲餘部所不代此中修行供養兼存二種事與理是也此經中説一百二十五種護摩爐護摩火天有四十四種就中一十二種火為最勝其中極妙有五種智火為初爐形及木有乳果苦練所用不同東西南北所願各殊內外護摩亦依五輪求四種事速疾成就息災增益降伏敬愛所謂火天各各不同寂靜熙怡忿怒喜怒次第應智苦依廣教行相極多今且略敘大毗盧遮那大教王經少分意趣其次明從上相承師資傳法次第但海雲慮恐大教傳持師資斷續大法淪墜年多廢忘三藏善無畏云此法從毗盧遮那佛付囑金剛手菩薩金剛手菩薩經數百年傳付中印度那爛陀寺達磨掬多阿闍梨達磨掬多阿闍梨次付中印度國三藏釋迦種善無畏梵云輪婆迦羅僧訶唐云善無畏三藏學究五明教間三藏五天藝業無不備能斛飯王五十二代之孫也捨襲王位出家入道開元七年從西國將大毗盧遮梵夾經等來至此國玄宗皇帝禮為國師隨駕兩京翻譯大毗盧遮那等經為大毗盧遮那曼荼羅灌頂大阿闍梨無畏三藏和尚復將此大毗盧遮那大教王付天竺國三藏金剛智三藏金剛智復將金剛界大教王授三藏善無畏互為阿闍梨遞相傳授三藏金剛智梵云嚩日囉二合吉娘二合曩此云金剛智三藏善解大小乘解聲明論於一切有部出家南天竺國國王之子亦捨王位出家來遊震旦誓弘聖教玄宗皇帝禮為國師隨駕兩京翻譯金剛頂大教王等經為金剛界曼荼羅灌頂阿闍梨三藏金剛智復將大毗盧遮那大教王付大興善寺三藏不空智阿闍梨梵云阿目佉吉娘二合那梵云不空智三藏和尚蘊五部五祕要入普賢之性海之心住瑜伽則頓入佛乘演真言則天魔摧碎三朝國書天子稽首自玄宗肅宗至于代宗珍仰之心敬之如佛代宗皇帝請為灌頂大阿闍梨所傳大教四十餘年所翻經論凡百餘部大興善寺三藏和尚從大和尚金剛智三藏傳授金剛界法已復恐大教未圓自往南天竺國親禮長年普賢阿闍梨重更咨受金剛界五部百千頌法將得十萬偈經故此二本大教王祕密甚深堪傳者稀經數百年方傳一人自佛法流傳東夏神州近一千餘年所有持念祕密心地教門流行不過此二本大教王即大毗盧遮那大教王及金剛界大教王是也統攝一切持念教門次有蘇悉地此云妙成就教廣明三部亦攝論持念法此中但明事成就與金剛界及大毗盧遮那義味相涉亦是至極要妙法三藏善無畏所譯兼前二部大教及蘇悉地共成三部大教大興善寺三藏和尚再譯流傳時善無畏三藏復將此大毗盧遮那大教王傳付大興善寺沙門一行及保壽寺新羅國沙門玄超沙門一行既傳教已造大毗盧遮那義譯七卷成分為十四卷略譯二卷大毗盧遮那形像圖樣壇儀一卷標幟壇儀法一卷契印法一卷造金剛頂經義決三卷上卷有本餘兩卷闕本大興唐寺一行和尚博膽天文學通內外唐梵經史無不洞明每與玄宗皇帝行座相隨論理國及預翻經不暇傳法次沙門玄超阿闍梨復將大毗盧遮那大教王及蘇悉地教傳付青龍寺東塔院惠果阿闍梨阿闍梨又傳付成都府僧惟尚又云惟明汴州辨弘新羅國僧惠日悟真日本國空海當院僧義滿義明義證義照義操義愍法潤付法傳阿闍梨灌頂位者數百十二人或有在京傳持或有外方弘教皆多淪沒次東塔院義操阿闍梨傳付同學僧義真景公寺深達淨住寺弟子海雲崇福寺僧大遇醴泉寺文苑已上五人皆傳教傳付次阿闍梨位次東塔院法潤阿闍梨傳付淨法寺僧道升玄法寺法全惟謹此大毗盧遮那大教王又名大悲胎藏毗盧遮那者從如來大悲根本發生大菩提心從菩提心成菩提行次證大菩提及涅槃皆從方便具足成就五智之身即是長惡字門故經云方便為究竟能成諸佛事如轉輪聖王將欲受生託在聖后母腹當知聖王不久生也修瑜伽者發菩提心住阿字觀觀法不生即是住毗盧遮那胎藏如顯教大乘仁王般若云伏忍聖胎三十人十住十行十回向此名地前三十心名住聖胎也此約顯教漸悟菩薩地前修行經一大阿僧祇劫始名住聖胎菩薩由名外凡夫修真言行菩薩則不如是於一念頃具足五智身住大毗盧遮那佛位廓周法界為曼荼羅體才住心名入聖胎觀至究竟名成佛位是名超越三僧祇劫而證菩提上來具明眙藏教意謹依顯密二教界略敘其由教意深廣難窮其底但海雲忝承佛蔭得遇至教親承法眼傳於大毗盧遮那蘇悉地從上相承至今七葉粗述宗旨隨所見聞略記次第諸有智者幸請指示稽首三際一切智普賢祕密持金剛回茲讚演福群生悉願同生安樂剎巨唐大和八年歲次甲寅十月上旬有八日淨住寺傳教苾芻海雲集記之寬喜元年三月二十八日奉寫了金剛佛子際辨交了此書異本兩三有之歟永仁五年十一月晦日以上件御本書寫比校了是則驚先師御名凌寒雪忘冷風書寫了慈心記之康安元年延文六三晦改之四月七日於東寺觀智院以慈心上人本書寫了但謬字多多可直之金剛資賢寶生二十九同十日以寫本加校合了此記異本有之本朝圓仁圓載圓珍宗睿遍明等編載之本雖有之今本不載之恐是根歟此記既大和八年撰集也彼入唐學法大和以後星霜稍隔爭可載彼名字乎以知後人所致也仍故所寫留此本也
