body:
  text: 兩部付法次第記海雲記略敘金剛界大教王經師資相承付法次第記三藏金剛智云我從南竺國親於龍智阿闍梨邊傳得此金剛界百千頌經龍智阿闍梨自云從毗盧遮那如來即釋迦如來是此約法性身為名在世以此金剛界最上乘法付屬普賢金剛薩埵普賢金剛薩埵付妙吉祥菩薩妙吉祥菩薩復經十二代以法付囑龍猛菩薩龍猛菩薩即龍樹菩薩也菩薩生時於龍樹下生故名龍樹也龍猛菩薩又經數百年以法付囑龍智阿闍梨龍智阿闍梨又經百餘年此二聖者道果成就皆壽數百歲以法付金剛智三藏梵云囀曰羅二合吉娘二合曩此云金剛智金剛智三藏和尚蘊大小乘宗一切有部住戒霜潔律為提塘南天竺國王第三子為弘法故杖錫五天來遊震旦時有中天竺國三藏性釋迦氏斛飯王五十二代孫因父王使命征戰遂見殺戮殘害者衆遂不樂王位厭世出家誓願傳法東國與金剛智三藏於玄宗朝同為國師知三藏金藏智解金剛界法遂於金剛智三藏請傳金剛界五部法時三藏金剛智知中天竺國無畏三藏解大毗盧遮那教歎言此法甚深難逢難遇昔於南天竺國聞有大毗盧遮那教名遂遊五天訪求都無解者今至大唐喜遇此教遂請無畏三藏求授大毗盧遮那大教亘為師資傳授二本教三藏金剛智阿闍梨又將此金剛界大教王付大興善寺三藏不空智阿闍梨三藏不空智和尚又以此法付囑含光阿闍梨等弟子五人一含光阿闍梨代宗皇帝有敕令修北五臺山造金閣寺不暇傳法二大興善寺惠朗阿闍梨傳於崇福寺天竺阿闍梨天竺阿闍梨傳付德美惠謹俗居士趙玖三青龍寺曇貞阿闍梨不傳弟子每有學法者云東塔院有惠果阿闍梨善通教相可於彼學四保壽寺覺超阿闍梨傳付契如惠德阿闍梨五青龍寺東塔院惠果阿闍梨善通聲論唐梵雙明每栖心於實相之門妙悟解於如如之理常諷維摩經又於餘暇常披讀涅槃花嚴般若楞伽思益復遇大興善三藏和尚授金剛界乃曰此教最上最妙然昔日所悟大乘心地亦為至極至妙今遇金剛界法門更為最上所以云極無有上者且顯教心地唯明理觀今此瑜伽教通理事二門住金剛界一念相應便登正覺故云極無有上也所傳金剛界法者則有大興善寺傳灌頂教同學惠應阿闍梨惠則成都府惟尚汴淋辨弘新羅國僧惠日日本國僧空海青龍寺義滿義明義操義照義愍義政義一俗居士靈殷已上十四人皆傳授大教次阿闍梨位次青龍寺東塔院義操阿闍梨所傳金剛界大法則有當院同學僧法潤義貞義舟義圓景公寺僧深達淨住寺僧海雲崇福寺僧大遇醴泉寺僧從賀文苑會昌寺新羅國僧圴亮當院常堅玄法寺僧智深法全弟子僧文祕已上一十四人授金剛界大法皆次阿闍梨位故得金剛界大教海內流行枝葉不絶優曇鉢教滿字已圓其有得傳金剛界法者頓見菩提入曼荼羅得授阿闍梨灌頂如授法輪王位此大教王名金剛界者金剛者堅固義也以表一切如來法身堅固不壞無生無滅無始無終堅固常存不壞也界者性也明一切如來金剛性遍一切有想身中本來具足圓滿普賢毗盧遮那大用自性身海性功德故修瑜伽者又以大樂普賢金剛欲箭三摩地破彼無明住地二障種現及二乘種摧碎無餘於一念頃證大日毗盧遮那位此經又名金剛頂者如人之身頂最為勝此教於一切大乘法中最為尊上故名金剛頂梵云縛曰嚕二合瑟抳二合沙此云金剛頂又是金剛界光明遍照如來現等覺身示現三密五智令一切有情證大圓鏡智成大菩提也此經梵本十萬偈略本四千偈廣本則有無量百千俱胝那庾多微塵數偈如金剛頂義決中説南天竺國有大鐵塔中有金剛界曼荼羅聖者形像鐵鑄所成其塔中有梵夾廣如床廣八九尺高下五六尺盡是金剛界大教王廣梵本經則知此經廣本有無量百千俱胝那庾多微塵數偈不可以凡心測量如法華化城喻品云説是法華經如恆河沙偈又藥王本事品説甄迦羅頻婆羅阿閦婆等偈隨根演教廣略不同即如花嚴經三本上本有十三千大千世界微塵數偈四天下微塵數品中本有四天下微塵數偈第三本十萬偈即花嚴八十卷經等是也即如金剛頂經梵夾經略本四千偈中本十萬偈廣本則有無量百千俱胝那庾多微偈又如華嚴經説普賢修多羅佛剎微塵數修多羅而為眷屬昔姚秦時羅什三藏將此梵網經云是大本菩薩戒經略譯成兩卷云是此經中淺略行相又至大唐開元年中三藏金剛智從南天竺國將得金剛界十萬偈梵夾經時大海中過大惡風三船中所有寶物舍利功德盡投於海中時十萬偈梵夾經誤忘亦投於海中三藏爾時作息災法遂得風止故知十萬偈經與此土緣薄故此經王沈沒大海次至太唐天寶九載三藏不空阿闍梨自往五天遍求勝法行至南天竺國得遇長年普賢阿闍梨遂再咨求重學金剛界法將得十萬偈經故金剛界前後所學者有少不同所以大興善寺三藏和尚代宗皇帝灌頂之師每與皇帝講金剛界甚深義味常在內道場翻譯聖教門下學徒授持明灌頂者數盈千萬升堂預翻譯者三十餘人入室傳阿闍梨灌頂者數唯五人如前文已敘金剛界毗盧遮那梵本經百千偈即十萬偈也説經處有十八會名目列數次第如十八會指歸説也四大品一金剛界二降三世三遍調伏四一切義成就此四種皆金剛界所攝一切法要以四智印攝所謂大印三摩耶印法智印羯磨智印又一一曼荼羅皆具六曼拏羅一所謂大曼拏羅二三昧耶曼荼羅三法曼荼羅四羯磨曼荼羅五四印曼荼羅六一印曼荼羅唯降三世曼荼羅具十曼餘皆具六其經説五部一佛部毗盧遮那佛以為部主四波羅蜜菩薩以為看屬二金剛部阿閦佛以為部主四大菩薩以為看屬三寶部寶生佛以為部主四大菩薩以為看屬四蓮華部阿彌陀佛以為部主四大菩薩以為看屬五羯磨部不空成就佛以為部主四大菩薩以為看屬內外供養及四攝成三十七又説四種法身一自性身二受用身三變化身四等流身四種地位一勝解行地二普賢行願地三大普賢地四普遍照輝地地前三賢為勝解行地從初地至十地為普賢行願地等覺菩薩為大普賢地佛名普遍照耀地四種念誦一聲念誦二語念誦亦名金剛念誦謂舌端微動唇齒合三三摩地念誦謂住定與觀智相應四勝義念誦思第一義諦如久之理四種求願法謂息災增益降伏敬愛并攝召成五又瑜伽經中明四種眼如經説四種座法如經説五種大願如經説又一切如來教集瑜伽中説一百二十種護摩爐爐中執印標幟各異所求迅速成辨世出世間果報諸會浩汗內曼拏羅尊位三十七并賢劫十六大菩薩表賢劫中一千佛或賢劫千佛皆在曼荼羅四方圍繞大曼荼羅成五十三并外二十天成七十三內院地水火風天成七十七四角有四忿怒明王或宣標幟形成八十一聖者身已上總名金剛界大曼荼羅王內五十三聖者屬灌頂尊餘天等皆各外金剛部不入灌頂位金剛界曼荼羅并外金剛部尊身共八十一皆是金剛界光明遍照如來之看屬以表十方三世盡虛空遍法界持微塵剎海一切如來身以為其體是亦十方三世諸佛般若波羅蜜母悉能出生一切諸佛菩薩金剛薩埵性所成就諸菩薩等亦能出世甚深祕密百千萬億修多羅藏皆是毗盧遮那如來性海功德亦能出世花藏莊嚴世界海有情世間及器世間皆是毗盧遮那如來體性周遍故一身充滿一切剎故云此教門難逢難遇故從上傳法者經數百年外方傳一人我大興善寺三藏和尚親禮五天重咨勝法教流天下大法盛傳所以新羅諸國經逾數萬航海忘軀來趨我唐至求勝法故得金剛界纍代相承每年有敕於大興善寺及青龍寺保壽興唐崇福醲泉寺大開灌頂傳法度人是皆我大興善寺三藏和尚傳法之孫資也弘教枝葉遞相傳持永久無盡苾芻海雲頃因餘暇時屬仲秋之月謹依本教略集金剛界大教王師資相承傳法次第從普賢金剛薩埵至今所傳繼于八葉敬禮金剛界自在普賢薩埵持明王回此讚演施群生普願同生華藏界巨唐大和八年歲在甲寅仲秋月二十日淨住寺梵字傳教沙門海雲集
